name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - name: Run release gates
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features --locked -- -D warnings
          cargo test --locked

      - name: Build and publish arm64 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          binary="target/aarch64-apple-darwin/release/vera"
          archive="vera-${version}-aarch64-apple-darwin.tar.gz"
          cargo build --release --locked --target aarch64-apple-darwin
          test -x "$binary"
          staging="$(mktemp -d)"
          trap 'rm -rf "$staging"' EXIT
          cp "$binary" "$staging/vera"
          touch -t 197001010000 "$staging/vera"
          tar -cf - -C "$staging" vera | gzip -n > "$archive"
          shasum -a 256 "$archive" > SHA256SUMS
          gh release create "$GITHUB_REF_NAME" \
            --title "Vera $GITHUB_REF_NAME" \
            --generate-notes \
            "$archive" SHA256SUMS
